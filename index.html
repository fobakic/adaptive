<!DOCTYPE html>
<html lang="en">
<head>

         .flexbox{
            display: flex;
            border: 2px solid black;
         }
         .item{
            color: white;
            padding: 5px;
         }
         .color-1{
            background-color: aquamarine;
         }
         .color-2{
            background-color: slateblue;
         }
         .color-3{
            background-color: darkred;
         }
         .flexbox-inline{
            display: inline-flex;
         }
    </style>
</head>
<body>
    <div class="flexbox">
        <div class="item color-1">первый</div>
        <div class="item color-2">второй</div>
        <div class="item color-3">третий</div>
    </div>
    <div class="flexbox flexbox-inline">
        <div class="item color-1">первый</div>
        <div class="item color-2">второй</div>
        <div class="item color-3">третий</div>
    </div>
</body>
</html>
